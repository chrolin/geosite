name: Build Rules

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *"
  push:
    branches: [master]
    paths-ignore:
      - "**/README.md"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Set vars
        run: |
          echo "RELEASE_NAME=Released on $(date +%Y%m%d%H%M)" >> $GITHUB_ENV
          echo "TAG_NAME=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV
          echo "CHINA_DOMAINS_URL=https://raw.githubusercontent.com/felixonmars/dnsmasq-china-list/master/accelerated-domains.china.conf" >> $GITHUB_ENV
          echo "GOOGLE_DOMAINS_URL=https://raw.githubusercontent.com/felixonmars/dnsmasq-china-list/master/google.china.conf" >> $GITHUB_ENV
          echo "APPLE_DOMAINS_URL=https://raw.githubusercontent.com/felixonmars/dnsmasq-china-list/master/apple.china.conf" >> $GITHUB_ENV
          echo "CUSTOM_DIRECT=https://raw.githubusercontent.com/Loyalsoldier/domain-list-custom/release/cn.txt" >> $GITHUB_ENV
          echo "CUSTOM_PROXY=https://raw.githubusercontent.com/Loyalsoldier/domain-list-custom/release/geolocation-!cn.txt" >> $GITHUB_ENV
          echo "EASYLISTCHINA_EASYLIST_REJECT_URL=https://easylist-downloads.adblockplus.org/easylistchina+easylist.txt" >> $GITHUB_ENV
          echo "PETERLOWE_REJECT_URL=https://pgl.yoyo.org/adservers/serverlist.php?hostformat=hosts&showintro=1&mimetype=plaintext" >> $GITHUB_ENV
          echo "ADGUARD_DNS_REJECT_URL=https://adguardteam.github.io/AdGuardSDNSFilter/Filters/filter.txt" >> $GITHUB_ENV
          echo "DANPOLLOCK_REJECT_URL=https://someonewhocares.org/hosts/hosts" >> $GITHUB_ENV

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Prepare directories
        run: |
          mkdir -p rules publish/surge publish/loon publish/egern publish/mihomo
          # 确保必要文件存在，避免脚本中断
          touch rules/direct.txt rules/proxy.txt rules/reject.txt rules/a.txt
          touch rules/direct-need-to-remove.txt rules/proxy-need-to-remove.txt rules/reject-need-to-remove.txt

      - name: Checkout domain-list-custom
        uses: actions/checkout@v4
        with:
          repository: Loyalsoldier/domain-list-custom
          path: custom

      - name: Checkout domain-list-community
        uses: actions/checkout@v4
        with:
          repository: v2fly/domain-list-community
          path: community

      - name: Checkout gfwlist2dnsmasq
        uses: actions/checkout@v4
        with:
          repository: cokebar/gfwlist2dnsmasq
          path: gfwlist2dnsmasq

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ./custom/go.mod
          cache-dependency-path: ./custom/go.sum

      - name: Download geoip
        run: |
          wget -q https://github.com/Loyalsoldier/geoip/raw/release/geoip.dat
          wget -q https://github.com/Loyalsoldier/geoip/raw/release/geoip.dat.sha256sum

      - name: Generate GFWList
        run: |
          cd gfwlist2dnsmasq
          chmod +x gfwlist2dnsmasq.sh
          ./gfwlist2dnsmasq.sh -l -o temp-gfwlist.txt
          cd ..

      - name: Build rule sources
        run: |
          # Build Direct
          curl -sSL $CHINA_DOMAINS_URL | perl -ne '/^server=\/([^\/]+)\// && print "$1\n"' > direct.src
          curl -sSL $CUSTOM_DIRECT | perl -ne '/^(domain):([^:]+)(\n$|:@.+)/ && print "$2\n"' >> direct.src
          cat rules/direct.txt >> direct.src
          sort -fu direct.src > direct-list.txt

          # Build Proxy
          cat gfwlist2dnsmasq/temp-gfwlist.txt | perl -ne '/^((?=^.{3,255})[a-zA-Z0-9][-_a-zA-Z0-9]{0,62}(\.[a-zA-Z0-9][-_a-zA-Z0-9]{0,62})+)/ && print "$1\n"' > proxy.src
          curl -sSL $GOOGLE_DOMAINS_URL | perl -ne '/^server=\/([^\/]+)\// && print "$1\n"' >> proxy.src
          curl -sSL $APPLE_DOMAINS_URL | perl -ne '/^server=\/([^\/]+)\// && print "$1\n"' >> proxy.src
          curl -sSL $CUSTOM_PROXY | grep -Ev ":@cn" | perl -ne '/^(domain):([^:]+)(\n$|:@.+)/ && print "$2\n"' >> proxy.src
          cat rules/proxy.txt >> proxy.src
          sort -fu proxy.src > proxy-list.txt

          # Build Reject
          curl -sSL $EASYLISTCHINA_EASYLIST_REJECT_URL | perl -ne '/^\|\|([-_0-9a-zA-Z]+(\.[-_0-9a-zA-Z]+){1,64})\^$/ && print "$1\n"' > reject.src
          curl -sSL $ADGUARD_DNS_REJECT_URL | perl -ne '/^\|\|([-_0-9a-zA-Z]+(\.[-_0-9a-zA-Z]+){1,64})\^$/ && print "$1\n"' >> reject.src
          curl -sSL $PETERLOWE_REJECT_URL | perl -ne '/^127\.0\.0\.1\s([-_0-9a-zA-Z]+(\.[-_0-9a-zA-Z]+){1,64})$/ && print "$1\n"' >> reject.src
          curl -sSL $DANPOLLOCK_REJECT_URL | perl -ne '/^127\.0\.0\.1\s([-_0-9a-zA-Z]+(\.[-_0-9a-zA-Z]+){1,64})/ && print "$1\n"' | sed '1d' >> reject.src
          cat rules/reject.txt >> reject.src
          sort -fu reject.src > reject-list.txt

          # Build Custom Set A (去重处理)
          sort -fu rules/a.txt > a-list.txt

      - name: Apply remove lists
        run: |
          grep -Fvx -f rules/direct-need-to-remove.txt direct-list.txt > direct-final.txt || cp direct-list.txt direct-final.txt
          grep -Fvx -f rules/proxy-need-to-remove.txt proxy-list.txt > proxy-final.txt || cp proxy-list.txt proxy-final.txt
          grep -Fvx -f rules/reject-need-to-remove.txt reject-list.txt > reject-final.txt || cp reject-list.txt reject-final.txt
          # 自定义 a 规则不设排除逻辑，直接使用
          cp a-list.txt a-final.txt

      - name: Write geosite data
        run: |
          mkdir -p community/data
          cp direct-final.txt community/data/cn
          cp proxy-final.txt community/data/geolocation-\!cn
          cp reject-final.txt community/data/category-ads-all
          
          # 自动将 rules 下的所有非特殊 txt 放入 geosite
          for f in rules/*.txt; do
            name=$(basename "$f" .txt)
            case $name in
              direct|proxy|reject|*-need-to-remove) continue ;;
            esac
            cp "$f" community/data/$name
          done

      - name: Build geosite
        run: |
          cd custom
          go run ./ --datapath=../community/data

      - name: Generate client rules
        run: |
          make_list () {
            src=$1
            name=$2
            [[ ! -f "$src" ]] && return
            while read line; do
              [[ -z "$line" ]] && continue
              case "$line" in
                full:*) echo "DOMAIN,${line#full:}" ;;
                keyword:*) echo "DOMAIN-KEYWORD,${line#keyword:}" ;;
                regexp:*) continue ;;
                *) echo "DOMAIN-SUFFIX,$line" ;;
              esac
            done < $src > tmp.list
            cp tmp.list publish/surge/$name.list
            cp tmp.list publish/loon/$name.list
            cp tmp.list publish/egern/$name.list
            echo "payload:" > publish/mihomo/$name.yaml
            sed 's/^/  - /' tmp.list >> publish/mihomo/$name.yaml
          }
          make_list direct-final.txt direct
          make_list proxy-final.txt proxy
          make_list reject-final.txt reject
          make_list a-final.txt a

      - name: Prepare publish files
        run: |
          cp custom/publish/geosite.dat publish/geosite.dat
          cp geoip.dat publish/geoip.dat
          cp geoip.dat.sha256sum publish/geoip.dat.sha256sum
          cp direct-final.txt publish/direct-list.txt
          cp proxy-final.txt publish/proxy-list.txt
          cp reject-final.txt publish/reject-list.txt
          cp a-final.txt publish/a-list.txt

      - name: Hash and zip
        run: |
          cd publish
          zip -q rules.zip *-list.txt geoip.dat geosite.dat
          sha256sum geosite.dat > geosite.dat.sha256sum
          sha256sum rules.zip > rules.zip.sha256sum

      - name: Debug publish files
        run: |
          ls -lah publish

      - name: Release assets
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          release_name: ${{ env.RELEASE_NAME }}
          tag: ${{ env.TAG_NAME }}
          file_glob: true
          overwrite: true
          file: ./publish/*

      - name: Push release branch
        run: |
          cd publish
          git init
          git config user.name github-actions
          git config user.email github-actions@github.com
          git checkout -b release
          git add .
          git commit -m "${{ env.RELEASE_NAME }}"
          git remote add origin https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git push -f origin release

      - name: Purge jsDelivr
        run: |
          cd publish
          for f in $(find . -type f); do
            curl -s "https://purge.jsdelivr.net/gh/${{ github.repository }}@release/${f#./}" || true
          done
