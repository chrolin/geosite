name: Build Rules

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *"
  push:
    branches:
      - master
    paths-ignore:
      - "**/README.md"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Set variables
        shell: bash
        run: |
          echo "RELEASE_NAME=Released on $(date +%Y%m%d%H%M)" >> "$GITHUB_ENV"
          echo "TAG_NAME=$(date +%Y%m%d%H%M)" >> "$GITHUB_ENV"
          echo "CHINA_DOMAINS_URL=https://raw.githubusercontent.com/felixonmars/dnsmasq-china-list/master/accelerated-domains.china.conf" >> "$GITHUB_ENV"
          echo "GOOGLE_DOMAINS_URL=https://raw.githubusercontent.com/felixonmars/dnsmasq-china-list/master/google.china.conf" >> "$GITHUB_ENV"
          echo "APPLE_DOMAINS_URL=https://raw.githubusercontent.com/felixonmars/dnsmasq-china-list/master/apple.china.conf" >> "$GITHUB_ENV"
          echo "EASYLISTCHINA_EASYLIST_REJECT_URL=https://easylist-downloads.adblockplus.org/easylistchina+easylist.txt" >> "$GITHUB_ENV"
          echo "PETERLOWE_REJECT_URL=https://pgl.yoyo.org/adservers/serverlist.php?hostformat=hosts&showintro=1&mimetype=plaintext" >> "$GITHUB_ENV"
          echo "ADGUARD_DNS_REJECT_URL=https://adguardteam.github.io/AdGuardSDNSFilter/Filters/filter.txt" >> "$GITHUB_ENV"
          echo "DANPOLLOCK_REJECT_URL=https://someonewhocares.org/hosts/hosts" >> "$GITHUB_ENV"
          echo "CUSTOM_DIRECT=https://raw.githubusercontent.com/Loyalsoldier/domain-list-custom/release/cn.txt" >> "$GITHUB_ENV"
          echo "CUSTOM_PROXY=https://raw.githubusercontent.com/Loyalsoldier/domain-list-custom/release/geolocation-!cn.txt" >> "$GITHUB_ENV"

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ensure rules directory and required files exist
        shell: bash
        run: |
          mkdir -p rules
          touch rules/proxy.txt
          touch rules/direct.txt
          touch rules/reject.txt
          touch rules/proxy-need-to-remove.txt
          touch rules/direct-need-to-remove.txt
          touch rules/reject-need-to-remove.txt

      - name: Checkout domain-list-custom
        uses: actions/checkout@v4
        with:
          repository: Loyalsoldier/domain-list-custom
          path: custom

      - name: Checkout domain-list-community
        uses: actions/checkout@v4
        with:
          repository: v2fly/domain-list-community
          path: community

      - name: Checkout gfwlist2dnsmasq
        uses: actions/checkout@v4
        with:
          repository: cokebar/gfwlist2dnsmasq
          path: gfwlist2dnsmasq

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ./custom/go.mod
          cache-dependency-path: ./custom/go.sum

      - name: Download geoip.dat
        shell: bash
        run: |
          wget -q https://github.com/Loyalsoldier/geoip/raw/release/geoip.dat
          wget -q https://github.com/Loyalsoldier/geoip/raw/release/geoip.dat.sha256sum

      - name: Generate GFWList domains
        shell: bash
        run: |
          cd gfwlist2dnsmasq || exit 1
          chmod +x ./gfwlist2dnsmasq.sh
          ./gfwlist2dnsmasq.sh -l -o ./temp-gfwlist.txt

      - name: Build temp direct list
        shell: bash
        run: |
          curl -sSL "$CHINA_DOMAINS_URL" \
            | perl -ne '/^server=\/([^\/]+)\// && print "$1\n"' \
            > temp-direct.txt

          curl -sSL "$CUSTOM_DIRECT" \
            | perl -ne '/^(domain):([^:]+)(\n$|:@.+)/ && print "$2\n"' \
            >> temp-direct.txt

          cat rules/direct.txt >> temp-direct.txt || true

      - name: Build temp proxy list
        shell: bash
        run: |
          cat ./gfwlist2dnsmasq/temp-gfwlist.txt \
            | perl -ne '/^((?=^.{3,255})[a-zA-Z0-9][-_a-zA-Z0-9]{0,62}(\.[a-zA-Z0-9][-_a-zA-Z0-9]{0,62})+)/ && print "$1\n"' \
            > temp-proxy.txt

          curl -sSL "$GOOGLE_DOMAINS_URL" \
            | perl -ne '/^server=\/([^\/]+)\// && print "$1\n"' \
            >> temp-proxy.txt

          curl -sSL "$APPLE_DOMAINS_URL" \
            | perl -ne '/^server=\/([^\/]+)\// && print "$1\n"' \
            >> temp-proxy.txt

          curl -sSL "$CUSTOM_PROXY" \
            | grep -Ev ":@cn" \
            | perl -ne '/^(domain):([^:]+)(\n$|:@.+)/ && print "$2\n"' \
            >> temp-proxy.txt

          cat rules/proxy.txt >> temp-proxy.txt || true

      - name: Build temp reject list
        shell: bash
        run: |
          curl -sSL "$EASYLISTCHINA_EASYLIST_REJECT_URL" \
            | perl -ne '/^\|\|([-_0-9a-zA-Z]+(\.[-_0-9a-zA-Z]+){1,64})\^$/ && print "$1\n"' \
            | perl -ne 'print if not /^[0-9]{1,3}(\.[0-9]{1,3}){3}$/' \
            > temp-reject.txt

          curl -sSL "$ADGUARD_DNS_REJECT_URL" \
            | perl -ne '/^\|\|([-_0-9a-zA-Z]+(\.[-_0-9a-zA-Z]+){1,64})\^$/ && print "$1\n"' \
            | perl -ne 'print if not /^[0-9]{1,3}(\.[0-9]{1,3}){3}$/' \
            >> temp-reject.txt

          curl -sSL "$PETERLOWE_REJECT_URL" \
            | perl -ne '/^127\.0\.0\.1\s([-_0-9a-zA-Z]+(\.[-_0-9a-zA-Z]+){1,64})$/ && print "$1\n"' \
            >> temp-reject.txt

          curl -sSL "$DANPOLLOCK_REJECT_URL" \
            | perl -ne '/^127\.0\.0\.1\s([-_0-9a-zA-Z]+(\.[-_0-9a-zA-Z]+){1,64})/ && print "$1\n"' \
            | sed '1d' \
            >> temp-reject.txt

          cat rules/reject.txt >> temp-reject.txt || true

      - name: Reserve full keyword regexp rules from upstream custom lists
        shell: bash
        run: |
          curl -sSL "$CUSTOM_DIRECT" \
            | perl -ne '/^((full|regexp|keyword):[^:]+)(\n$|:@.+)/ && print "$1\n"' \
            | sort --ignore-case -u \
            > direct-reserve.txt

          curl -sSL "$CUSTOM_PROXY" \
            | grep -Ev ":@cn" \
            | perl -ne '/^((full|regexp|keyword):[^:]+)(\n$|:@.+)/ && print "$1\n"' \
            | sort --ignore-case -u \
            > proxy-reserve.txt

          touch reject-reserve.txt

      - name: Deduplicate lists
        shell: bash
        run: |
          sort --ignore-case -u temp-direct.txt > direct-list-without-redundant
          sort --ignore-case -u temp-proxy.txt > proxy-list-without-redundant
          sort --ignore-case -u temp-reject.txt > reject-list-without-redundant

      - name: Apply need-to-remove lists
        shell: bash
        run: |
          cp direct-list-without-redundant temp-cn.txt
          cp proxy-list-without-redundant temp-geolocation-\!cn.txt
          cp reject-list-without-redundant temp-category-ads-all.txt

          if [ -s rules/direct-need-to-remove.txt ]; then
            grep -Fvx -f rules/direct-need-to-remove.txt direct-list-without-redundant > temp-cn.txt || true
          fi

          if [ -s rules/proxy-need-to-remove.txt ]; then
            grep -Fvx -f rules/proxy-need-to-remove.txt proxy-list-without-redundant > temp-geolocation-\!cn.txt || true
          fi

          if [ -s rules/reject-need-to-remove.txt ]; then
            grep -Fvx -f rules/reject-need-to-remove.txt reject-list-without-redundant > temp-category-ads-all.txt || true
          fi

          [ -s temp-cn.txt ] || cp direct-list-without-redundant temp-cn.txt
          [ -s temp-geolocation-\!cn.txt ] || cp proxy-list-without-redundant temp-geolocation-\!cn.txt
          [ -s temp-category-ads-all.txt ] || cp reject-list-without-redundant temp-category-ads-all.txt

      - name: Write lists to community data
        shell: bash
        run: |
          mkdir -p ./community/data

          cat temp-cn.txt \
            | sort --ignore-case -u \
            | perl -ne '/^((?=^.{1,255})[a-zA-Z0-9][-_a-zA-Z0-9]{0,62}(\.[a-zA-Z0-9][-_a-zA-Z0-9]{0,62})*)/ && print "$1\n"' \
            > ./community/data/cn

          cat temp-cn.txt \
            | sort --ignore-case -u \
            | perl -ne 'print if not /^((?=^.{3,255})[a-zA-Z0-9][-_a-zA-Z0-9]{0,62}(\.[a-zA-Z0-9][-_a-zA-Z0-9]{0,62})+)/' \
            > direct-tld-list.txt

          cat temp-geolocation-\!cn.txt \
            | sort --ignore-case -u \
            | perl -ne '/^((?=^.{1,255})[a-zA-Z0-9][-_a-zA-Z0-9]{0,62}(\.[a-zA-Z0-9][-_a-zA-Z0-9]{0,62})*)/ && print "$1\n"' \
            > ./community/data/geolocation-\!cn

          cat temp-geolocation-\!cn.txt \
            | sort --ignore-case -u \
            | perl -ne 'print if not /^((?=^.{3,255})[a-zA-Z0-9][-_a-zA-Z0-9]{0,62}(\.[a-zA-Z0-9][-_a-zA-Z0-9]{0,62})+)/' \
            > proxy-tld-list.txt

          cat temp-category-ads-all.txt \
            | sort --ignore-case -u \
            | perl -ne '/^((?=^.{1,255})[a-zA-Z0-9][-_a-zA-Z0-9]{0,62}(\.[a-zA-Z0-9][-_a-zA-Z0-9]{0,62})*)/ && print "$1\n"' \
            > ./community/data/category-ads-all

          cat temp-category-ads-all.txt \
            | sort --ignore-case -u \
            | perl -ne 'print if not /^((?=^.{3,255})[a-zA-Z0-9][-_a-zA-Z0-9]{0,62}(\.[a-zA-Z0-9][-_a-zA-Z0-9]{0,62})+)/' \
            > reject-tld-list.txt

          for file in rules/*.txt; do
            [ -e "$file" ] || continue
            name=$(basename "$file" .txt)

            if [ "$name" = "proxy" ] || \
               [ "$name" = "direct" ] || \
               [ "$name" = "reject" ] || \
               [ "$name" = "proxy-need-to-remove" ] || \
               [ "$name" = "direct-need-to-remove" ] || \
               [ "$name" = "reject-need-to-remove" ]; then
              continue
            fi

            cp "$file" "./community/data/$name"
          done

      - name: Add reserved full keyword regexp rules back
        shell: bash
        run: |
          [ -f direct-reserve.txt ] && cat direct-reserve.txt >> ./community/data/cn
          [ -f proxy-reserve.txt ] && cat proxy-reserve.txt >> ./community/data/geolocation-\!cn
          [ -f reject-reserve.txt ] && cat reject-reserve.txt >> ./community/data/category-ads-all

          cp ./community/data/cn direct-list.txt
          cp ./community/data/geolocation-\!cn proxy-list.txt
          cp ./community/data/category-ads-all reject-list.txt

      - name: Create extra lists
        shell: bash
        run: |
          curl -sSL "$CHINA_DOMAINS_URL" \
            | perl -ne '/^server=\/([^\/]+)\// && print "$1\n"' \
            > ./community/data/china-list
          cp ./community/data/china-list china-list.txt

          curl -sSL "$GOOGLE_DOMAINS_URL" \
            | perl -ne '/^server=\/([^\/]+)\// && print "full:$1\n"' \
            > ./community/data/google-cn
          cp ./community/data/google-cn google-cn.txt

          curl -sSL "$APPLE_DOMAINS_URL" \
            | perl -ne '/^server=\/([^\/]+)\// && print "full:$1\n"' \
            > ./community/data/apple-cn
          cp ./community/data/apple-cn apple-cn.txt

          cat ./gfwlist2dnsmasq/temp-gfwlist.txt \
            | perl -ne '/^((?=^.{3,255})[a-zA-Z0-9][-_a-zA-Z0-9]{0,62}(\.[a-zA-Z0-9][-_a-zA-Z0-9]{0,62})+)/ && print "$1\n"' \
            >> ./community/data/gfw || true

          sort --ignore-case -u ./community/data/gfw > gfw.txt
          sort --ignore-case -u ./community/data/greatfire > greatfire.txt

      - name: Build geosite.dat
        shell: bash
        run: |
          cd custom || exit 1
          go run ./ --datapath=../community/data

      - name: Build Surge Loon Egern lists
        shell: bash
        run: |
          mkdir -p publish/surge publish/loon publish/egern

          for file in rules/*.txt; do
            [ -e "$file" ] || continue
            name=$(basename "$file" .txt)

            if [ "$name" = "proxy-need-to-remove" ] || \
               [ "$name" = "direct-need-to-remove" ] || \
               [ "$name" = "reject-need-to-remove" ]; then
              continue
            fi

            : > "publish/surge/$name.list"
            : > "publish/loon/$name.list"
            : > "publish/egern/$name.list"

            while IFS= read -r line || [ -n "$line" ]; do
              [ -z "$line" ] && continue
              case "$line" in \#*) continue ;; esac

              case "$line" in
                full:*)
                  value=${line#full:}
                  echo "DOMAIN,$value" >> "publish/surge/$name.list"
                  echo "DOMAIN,$value" >> "publish/loon/$name.list"
                  echo "DOMAIN,$value" >> "publish/egern/$name.list"
                  ;;
                keyword:*)
                  value=${line#keyword:}
                  echo "DOMAIN-KEYWORD,$value" >> "publish/surge/$name.list"
                  echo "DOMAIN-KEYWORD,$value" >> "publish/loon/$name.list"
                  echo "DOMAIN-KEYWORD,$value" >> "publish/egern/$name.list"
                  ;;
                regexp:*)
                  ;;
                *)
                  echo "DOMAIN-SUFFIX,$line" >> "publish/surge/$name.list"
                  echo "DOMAIN-SUFFIX,$line" >> "publish/loon/$name.list"
                  echo "DOMAIN-SUFFIX,$line" >> "publish/egern/$name.list"
                  ;;
              esac
            done < "$file"
          done

      - name: Build Mihomo rule providers
        shell: bash
        run: |
          mkdir -p publish/mihomo

          for file in rules/*.txt; do
            [ -e "$file" ] || continue
            name=$(basename "$file" .txt)

            if [ "$name" = "proxy-need-to-remove" ] || \
               [ "$name" = "direct-need-to-remove" ] || \
               [ "$name" = "reject-need-to-remove" ]; then
              continue
            fi

            {
              echo "payload:"
              while IFS= read -r line || [ -n "$line" ]; do
                [ -z "$line" ] && continue
                case "$line" in \#*) continue ;; esac

                case "$line" in
                  full:*)
                    value=${line#full:}
                    echo "  - DOMAIN,$value"
                    ;;
                  keyword:*)
                    value=${line#keyword:}
                    echo "  - DOMAIN-KEYWORD,$value"
                    ;;
                  regexp:*)
                    ;;
                  *)
                    echo "  - DOMAIN-SUFFIX,$line"
                    ;;
                esac
              done < "$file"
            } > "publish/mihomo/$name.yaml"
          done

      - name: Prepare publish files
        shell: bash
        run: |
          mkdir -p publish
          install -Dp ./geoip.dat ./publish/geoip.dat
          install -Dp ./geoip.dat.sha256sum ./publish/geoip.dat.sha256sum
          install -Dp ./custom/publish/geosite.dat ./publish/geosite.dat
          install -p direct-tld-list.txt ./publish/
          install -p proxy-tld-list.txt ./publish/
          install -p reject-tld-list.txt ./publish/
          install -p direct-list.txt ./publish/
          install -p proxy-list.txt ./publish/
          install -p reject-list.txt ./publish/
          install -p china-list.txt ./publish/
          install -p apple-cn.txt ./publish/
          install -p google-cn.txt ./publish/
          install -p gfw.txt ./publish/
          install -p greatfire.txt ./publish/

      - name: Generate hashes and zip
        shell: bash
        run: |
          cd ./publish || exit 1
          zip -q rules.zip direct-list.txt proxy-list.txt reject-list.txt geoip.dat geosite.dat
          sha256sum geosite.dat > geosite.dat.sha256sum
          sha256sum rules.zip > rules.zip.sha256sum

      - name: Release and upload assets
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          release_name: ${{ env.RELEASE_NAME }}
          tag: ${{ env.TAG_NAME }}
          file_glob: true
          file: ./publish/**/*

      - name: Push assets to release branch
        shell: bash
        run: |
          cd publish || exit 1
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          git add .
          git commit -m "${{ env.RELEASE_NAME }}"
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f -u origin release

      - name: Purge jsDelivr CDN
        shell: bash
        run: |
          cd publish || exit 1
          find . -type f | sed 's#^\./##' | while read -r file; do
            curl -i "https://purge.jsdelivr.net/gh/${{ github.repository }}@release/${file}" || true
          done
