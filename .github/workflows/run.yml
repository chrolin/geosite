name: Build V2Ray rules dat files

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *"
  push:
    branches:
      - master
    paths-ignore:
      - "**/README.md"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Set variables
        run: |
          echo "RELEASE_NAME=Released on $(date +%Y%m%d%H%M)" >> $GITHUB_ENV
          echo "TAG_NAME=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV
          echo "CHINA_DOMAINS_URL=https://raw.githubusercontent.com/felixonmars/dnsmasq-china-list/master/accelerated-domains.china.conf" >> $GITHUB_ENV
          echo "GOOGLE_DOMAINS_URL=https://raw.githubusercontent.com/felixonmars/dnsmasq-china-list/master/google.china.conf" >> $GITHUB_ENV
          echo "APPLE_DOMAINS_URL=https://raw.githubusercontent.com/felixonmars/dnsmasq-china-list/master/apple.china.conf" >> $GITHUB_ENV
          echo "EASYLISTCHINA_EASYLIST_REJECT_URL=https://easylist-downloads.adblockplus.org/easylistchina+easylist.txt" >> $GITHUB_ENV
          echo "PETERLOWE_REJECT_URL=https://pgl.yoyo.org/adservers/serverlist.php?hostformat=hosts&showintro=1&mimetype=plaintext" >> $GITHUB_ENV
          echo "ADGUARD_DNS_REJECT_URL=https://adguardteam.github.io/AdGuardSDNSFilter/Filters/filter.txt" >> $GITHUB_ENV
          echo "DANPOLLOCK_REJECT_URL=https://someonewhocares.org/hosts/hosts" >> $GITHUB_ENV
          echo "CUSTOM_DIRECT=https://raw.githubusercontent.com/Loyalsoldier/domain-list-custom/release/cn.txt" >> $GITHUB_ENV
          echo "CUSTOM_PROXY=https://raw.githubusercontent.com/Loyalsoldier/domain-list-custom/release/geolocation-!cn.txt" >> $GITHUB_ENV

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ensure custom rule files exist
        run: |
          touch proxy.txt
          touch direct.txt
          touch reject.txt
          touch proxy-need-to-remove.txt
          touch direct-need-to-remove.txt
          touch reject-need-to-remove.txt

      - name: Checkout domain-list-custom
        uses: actions/checkout@v4
        with:
          repository: Loyalsoldier/domain-list-custom
          path: custom

      - name: Checkout domain-list-community
        uses: actions/checkout@v4
        with:
          repository: v2fly/domain-list-community
          path: community

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ./custom/go.mod
          cache-dependency-path: ./custom/go.sum

      - name: Download geoip.dat
        run: |
          wget https://github.com/Loyalsoldier/geoip/raw/release/geoip.dat
          wget https://github.com/Loyalsoldier/geoip/raw/release/geoip.dat.sha256sum

      - name: Generate proxy/direct/reject temp lists
        run: |
          curl -sSL "$CHINA_DOMAINS_URL" | perl -ne '/^server=\/([^\/]+)\// && print "$1\n"' > temp-direct.txt
          curl -sSL "$CUSTOM_DIRECT" | perl -ne '/^(domain):([^:]+)(\n$|:@.+)/ && print "$2\n"' >> temp-direct.txt

          curl -sSL "$CUSTOM_PROXY" | grep -Ev ":@cn" | perl -ne '/^(domain):([^:]+)(\n$|:@.+)/ && print "$2\n"' > temp-proxy.txt

          curl -sSL "$EASYLISTCHINA_EASYLIST_REJECT_URL" \
          | perl -ne '/^\|\|([-_0-9a-zA-Z]+(\.[-_0-9a-zA-Z]+){1,64})\^$/ && print "$1\n"' \
          > temp-reject.txt

      - name: Add custom domains
        run: |
          cat proxy.txt >> temp-proxy.txt
          cat direct.txt >> temp-direct.txt
          cat reject.txt >> temp-reject.txt

      - name: Sort lists
        run: |
          sort -u temp-proxy.txt > proxy-list-with-redundant
          sort -u temp-direct.txt > direct-list-with-redundant
          sort -u temp-reject.txt > reject-list-with-redundant

      - name: Remove redundant domains
        run: |
          chmod +x ./custom/findRedundantDomain.py
          python3 ./custom/findRedundantDomain.py ./direct-list-with-redundant ./direct-list-deleted-unsort || true
          python3 ./custom/findRedundantDomain.py ./proxy-list-with-redundant ./proxy-list-deleted-unsort || true
          python3 ./custom/findRedundantDomain.py ./reject-list-with-redundant ./reject-list-deleted-unsort || true

          touch direct-list-deleted-unsort proxy-list-deleted-unsort reject-list-deleted-unsort

          sort direct-list-deleted-unsort > direct-list-deleted-sort
          sort proxy-list-deleted-unsort > proxy-list-deleted-sort
          sort reject-list-deleted-unsort > reject-list-deleted-sort

          diff direct-list-deleted-sort direct-list-with-redundant \
          | awk '/^>/{print $2}' > direct-list-without-redundant || true

          diff proxy-list-deleted-sort proxy-list-with-redundant \
          | awk '/^>/{print $2}' > proxy-list-without-redundant || true

          diff reject-list-deleted-sort reject-list-with-redundant \
          | awk '/^>/{print $2}' > reject-list-without-redundant || true

          touch direct-list-without-redundant proxy-list-without-redundant reject-list-without-redundant

      - name: Write lists to data directory
        run: |
          cp direct-list-without-redundant ./community/data/cn
          cp proxy-list-without-redundant ./community/data/geolocation-!cn
          cp reject-list-without-redundant ./community/data/category-ads-all

      - name: Build geosite.dat
        run: |
          cd custom
          go run ./ --datapath=../community/data

      - name: Prepare publish files
        run: |
          mkdir publish
          cp geoip.dat publish/
          cp geoip.dat.sha256sum publish/
          cp custom/publish/geosite.dat publish/

      - name: Generate sha256
        run: |
          cd publish
          sha256sum geosite.dat > geosite.dat.sha256sum

      - name: Upload Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          release_name: ${{ env.RELEASE_NAME }}
          tag: ${{ env.TAG_NAME }}
          file_glob: true
          file: ./publish/*

      - name: Push to release branch
        run: |
          cd publish
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          git add .
          git commit -m "${{ env.RELEASE_NAME }}"
          git remote add origin https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git push -f origin release
